name: "✨ 功能请求"
description: 建议新功能或改进。
title: "[功能]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢您的建议！在提交之前，请考虑：

        - **这是一个新技能吗？** 大多数功能应该是[技能，而非工具](https://github.com/NousResearch/hermes-agent/blob/main/CONTRIBUTING.md#should-it-be-a-skill-or-a-tool)。如果它是一个专门的集成（加密货币、NFT、小众SaaS），它属于技能中心，而不是捆绑包。
        - **搜索[现有问题](https://github.com/NousResearch/hermes-agent/issues)** — 可能已经有人提过这个建议了。

  - type: textarea
    id: problem
    attributes:
      label: 问题或用例
      description: 这解决了什么问题？您目前无法做到什么？
      placeholder: |
        我正尝试将 Hermes 与 [提供商/平台/工作流] 一起使用，但目前
        没有办法...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 建议的解决方案
      description: 您认为这应该如何工作？请尽可能具体 — CLI 标志、配置选项、UI 行为。
      placeholder: |
        向 `hermes chat` 添加一个 `--foo` 标志以启用...
        或者：添加一个配置键 `bar.baz` 来控制...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 考虑过的替代方案
      description: 您考虑过哪些其他方法？为什么建议的解决方案更好？

  - type: dropdown
    id: type
    attributes:
      label: 功能类型
      options:
        - 新工具
        - 新捆绑技能
        - CLI 改进
        - 消息网关 / 消息传递改进
        - 配置选项
        - 性能 / 可靠性
        - 开发者体验（测试、文档、CI）
        - 其他
    validations:
      required: true

  - type: dropdown
    id: scope
    attributes:
      label: 范围
      description: 这个改动有多大？
      options:
        - 小（单个文件，< 50 行）
        - 中（少数文件，< 300 行）
        - 大（新模块或重大重构）

  - type: checkboxes
    id: pr-ready
    attributes:
      label: 贡献
      options:
        - label: 我希望自己实现这个功能并提交 PR

  - type: textarea
    id: debug-report
    attributes:
      label: 调试报告（可选）
      description: |
        如果此功能请求与您遇到的问题相关，请运行 `hermes debug share` 并将链接粘贴在此处。
        在交互式聊天会话中，您可以使用 `/debug` 命令。
        这有助于我们了解您的执行环境和任何相关日志。
      placeholder: |
        报告   https://paste.rs/abc123
      render: shell
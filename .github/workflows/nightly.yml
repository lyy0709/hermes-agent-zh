name: Nightly 自动翻译构建

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      force_translate:
        description: '强制重新翻译所有文件'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

env:
  UPSTREAM_REPO: NousResearch/hermes-agent
  UPSTREAM_BRANCH: main
  PYTHON_VERSION: '3.12'
  PYTHONUNBUFFERED: '1'

jobs:
  check-upstream:
    name: 检测上游更新
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.check.outputs.has_changes }}
      upstream_sha: ${{ steps.check.outputs.upstream_sha }}
      upstream_version: ${{ steps.check.outputs.upstream_version }}
    steps:
      - name: 检出本仓库
        uses: actions/checkout@v4

      - name: 检测上游变更
        id: check
        run: |
          UPSTREAM_SHA=$(git ls-remote https://github.com/${{ env.UPSTREAM_REPO }}.git refs/heads/${{ env.UPSTREAM_BRANCH }} | cut -f1)
          echo "upstream_sha=$UPSTREAM_SHA" >> "$GITHUB_OUTPUT"

          UPSTREAM_VERSION=$(git ls-remote --tags --sort=-v:refname https://github.com/${{ env.UPSTREAM_REPO }}.git 'v*' | grep -v '\^{}' | head -1 | sed 's|.*refs/tags/||')
          echo "upstream_version=$UPSTREAM_VERSION" >> "$GITHUB_OUTPUT"

          LAST_SHA=""
          if [ -f .last-synced-sha ]; then
            LAST_SHA=$(cat .last-synced-sha)
          fi

          if [ "$UPSTREAM_SHA" = "$LAST_SHA" ] && [ "${{ inputs.force_translate }}" != "true" ]; then
            echo "上游无变更，跳过构建"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "检测到上游变更: $LAST_SHA -> $UPSTREAM_SHA"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

  translate-and-publish:
    name: 翻译 + 构建 + 发布到 release 分支
    needs: check-upstream
    if: needs.check-upstream.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: 检出本仓库
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 安装依赖
        run: pip install -r requirements.txt

      # ── 克隆上游 ──
      - name: 克隆上游仓库
        run: |
          git clone --depth 100 https://github.com/${{ env.UPSTREAM_REPO }}.git upstream
          cd upstream
          echo "上游 SHA: $(git rev-parse HEAD)"
          echo "上游最新 tag: $(git describe --tags --abbrev=0 2>/dev/null || echo 'none')"

      # ── 增量翻译 ──
      - name: 检测变更文件
        run: python scripts/detect_changes.py --upstream upstream

      - name: 执行增量翻译
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          TRANSLATION_MODEL: ${{ secrets.TRANSLATION_MODEL }}
          TRANSLATION_WORKERS: ${{ secrets.TRANSLATION_WORKERS }}
          TRANSLATION_RPM: ${{ secrets.TRANSLATION_RPM }}
          TRANSLATION_TPM: ${{ secrets.TRANSLATION_TPM }}
          TRANSLATION_TIMEOUT: ${{ secrets.TRANSLATION_TIMEOUT }}
        run: |
          FORCE_FLAG=""
          if [ "${{ inputs.force_translate }}" = "true" ]; then
            FORCE_FLAG="--force"
          fi
          python scripts/translate.py --upstream upstream $FORCE_FLAG

      # ── 保存翻译结果到 main 分支 ──
      - name: 提交翻译结果到 main
        run: |
          echo "${{ needs.check-upstream.outputs.upstream_sha }}" > .last-synced-sha
          echo "${{ needs.check-upstream.outputs.upstream_version }}" > .last-synced-version
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add translations/ .last-synced-sha .last-synced-version
          if git diff --staged --quiet; then
            echo "无翻译变更需要提交"
          else
            git commit -m "chore: 自动翻译更新 (upstream: ${{ needs.check-upstream.outputs.upstream_sha }})"
            git push origin main
          fi

      # ── 验证 + 应用翻译到上游源码 ──
      - name: 验证翻译（apply 之前，检查替换规则有效性）
        run: python scripts/verify.py --upstream upstream --strict

      - name: 应用翻译
        run: python scripts/apply.py --upstream upstream --verbose

      # ── 将翻译后的完整源码推送到 release 分支 ──
      - name: 推送到 release 分支
        run: |
          UPSTREAM_VERSION="${{ needs.check-upstream.outputs.upstream_version }}"
          UPSTREAM_SHA="${{ needs.check-upstream.outputs.upstream_sha }}"

          cd upstream

          # 删除上游的 workflow 文件（GITHUB_TOKEN 无 workflows 写权限）
          rm -rf .github/workflows

          # 将安装脚本复制到上游源码中（覆盖原版）
          cp ../scripts/install.sh scripts/install.sh 2>/dev/null || true
          cp ../scripts/install.ps1 scripts/install.ps1 2>/dev/null || true

          # 初始化为独立 git 仓库并推送到 release 分支
          rm -rf .git
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b release
          git add -A
          git commit -m "release: hermes-agent 中文版 (upstream: ${UPSTREAM_VERSION}, sha: ${UPSTREAM_SHA:0:12})"
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git push --force origin release

      # ── 创建 Release ──
      - name: 创建 Nightly Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          UPSTREAM_VERSION="${{ needs.check-upstream.outputs.upstream_version }}"
          UPSTREAM_SHA="${{ needs.check-upstream.outputs.upstream_sha }}"
          TIMESTAMP=$(date -u +%Y%m%d%H%M)
          TAG="nightly-${TIMESTAMP}"

          # 删除旧的 nightly release（保留最近 5 个）
          gh release list --limit 20 | grep 'nightly-' | tail -n +6 | awk '{print $1}' | while read tag; do
            gh release delete "$tag" --yes --cleanup-tag 2>/dev/null || true
          done

          gh release create "$TAG" \
            --title "Hermes Agent 中文版 Nightly ${TIMESTAMP}" \
            --notes "$(cat <<EOF
          ## Hermes Agent 中文版 Nightly 构建

          - 上游版本: ${UPSTREAM_VERSION}
          - 上游 SHA: \`${UPSTREAM_SHA}\`
          - 构建时间: $(date -u +%Y-%m-%d\ %H:%M\ UTC)

          ### 一键安装

          **Linux / macOS:**
          \`\`\`bash
          curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/scripts/install.sh | bash
          \`\`\`

          **Windows (PowerShell):**
          \`\`\`powershell
          irm https://raw.githubusercontent.com/${{ github.repository }}/main/scripts/install.ps1 | iex
          \`\`\`

          <!-- upstream_sha:${UPSTREAM_SHA} -->
          EOF
          )" \
            --prerelease

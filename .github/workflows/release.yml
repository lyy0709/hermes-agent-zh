name: 稳定版发布

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      upstream_tag:
        description: '上游版本 tag（如 v2026.4.8）'
        required: true
        type: string

permissions:
  contents: write

env:
  UPSTREAM_REPO: NousResearch/hermes-agent
  PYTHON_VERSION: '3.12'
  PYTHONUNBUFFERED: '1'

jobs:
  build-and-release:
    name: 构建 + 发布稳定版
    runs-on: ubuntu-latest
    steps:
      - name: 检出本仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 确定上游版本
        id: info
        run: |
          if [ -n "${{ inputs.upstream_tag }}" ]; then
            echo "upstream_version=${{ inputs.upstream_tag }}" >> "$GITHUB_OUTPUT"
          elif [ -f .last-synced-version ]; then
            echo "upstream_version=$(cat .last-synced-version)" >> "$GITHUB_OUTPUT"
          else
            echo "错误: 无法确定上游版本"
            exit 1
          fi

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 克隆上游仓库
        run: |
          UPSTREAM_VERSION="${{ steps.info.outputs.upstream_version }}"
          echo "克隆上游版本: $UPSTREAM_VERSION"
          if ! git clone --branch "$UPSTREAM_VERSION" --depth 1 https://github.com/${{ env.UPSTREAM_REPO }}.git upstream; then
            echo "错误: 无法克隆指定版本 $UPSTREAM_VERSION，中止构建"
            exit 1
          fi

      - name: 验证翻译（apply 之前）
        run: python scripts/verify.py --upstream upstream --strict

      - name: 应用翻译
        run: python scripts/apply.py --upstream upstream --verbose

      # ── 推送到 release 分支 ──
      - name: 推送到 release 分支
        run: |
          UPSTREAM_VERSION="${{ steps.info.outputs.upstream_version }}"

          cd upstream

          # 覆盖安装脚本
          cp ../scripts/install.sh scripts/install.sh 2>/dev/null || true
          cp ../scripts/install.ps1 scripts/install.ps1 2>/dev/null || true

          rm -rf .git
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b release
          git add -A
          git commit -m "release: hermes-agent 中文版 ${UPSTREAM_VERSION}-zh"
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git push --force origin release

      - name: 创建 Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME:-${{ inputs.upstream_tag }}-zh}"
          UPSTREAM_VERSION="${{ steps.info.outputs.upstream_version }}"

          gh release create "$TAG" \
            --title "Hermes Agent 中文版 $TAG" \
            --notes "$(cat <<EOF
          ## Hermes Agent 中文版 稳定版发布

          - 上游版本: ${UPSTREAM_VERSION}
          - 翻译版本: ${TAG}

          ### 一键安装

          **Linux / macOS:**
          \`\`\`bash
          curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/scripts/install.sh | bash
          \`\`\`

          **Windows (PowerShell):**
          \`\`\`powershell
          irm https://raw.githubusercontent.com/${{ github.repository }}/main/scripts/install.ps1 | iex
          \`\`\`
          EOF
          )" \
            --latest
